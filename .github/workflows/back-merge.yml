name: Back-merge main into develop

on:
  push:
    branches: [main]

jobs:
  back-merge:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Prepare back-merge branch
        run: |
          git fetch origin main develop
          git checkout -B chore/back-merge-main origin/develop
          if git merge-base --is-ancestor origin/main HEAD; then
            echo "develop already contains main — nothing to back-merge."
            echo "SKIP=1" >> "$GITHUB_ENV"
            exit 0
          fi
          git merge origin/main --no-edit --no-ff -m "chore: back-merge main into develop"
          git push --force-with-lease origin chore/back-merge-main

      - name: Open or update back-merge PR
        if: env.SKIP != '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh pr view chore/back-merge-main --json number >/dev/null 2>&1; then
            echo "Existing back-merge PR updated via push."
          else
            gh pr create \
              --base develop \
              --head chore/back-merge-main \
              --title "chore: back-merge main into develop" \
              --body "Automated back-merge of main into develop after a release."
          fi
