name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pre-commit (for E2E config-validation test)
        run: pip install pre-commit

      - run: npm ci

      # ISSUE-011 supply-chain guard: fast-uri<3.1.2 has a known issue; the
      # package.json `overrides` pin to >=3.1.2 must survive every
      # lockfile regeneration. Fail CI if any hoisted version slips below.
      - name: Guard fast-uri override
        run: node scripts/guard-fast-uri.mjs

      # ISSUE-014 architectural guard: reject organisational barrel index.ts
      # files in src/. Barrels are permitted only at deliberate boundary
      # surfaces (public API entry, template-loader registries). The rule
      # codi-typescript.md v2 documents the policy.
      - name: Guard organisational barrels
        run: node scripts/guard-no-internal-barrels.mjs

      # ISSUE-015 architectural guard: dependencies flow inward — core/ and
      # runtime/ must never import from cli/. The rule codi-architecture.md
      # documents the policy; this guard enforces it mechanically.
      - name: Guard layering (core/runtime → cli forbidden)
        run: node scripts/guard-layering.mjs

      # ISSUE-016 architectural guard: agent ids must derive from the
      # canonical sources (SUPPORTED_PLATFORMS / ALL_ADAPTERS). Inline literal
      # tuples of agent ids outside the whitelist will fail this check.
      - name: Guard agent identity (no hardcoded id literals)
        run: node scripts/guard-agent-identity.mjs

      # ISSUE-017 architectural guard: `.codi`, `"codi"`, `"Codi"`,
      # `managed_by: "codi"|"user"` literals must derive from constants
      # (PROJECT_DIR / PROJECT_NAME / PROJECT_NAME_DISPLAY / MANAGED_BY_*).
      # The guard whitelists constants.ts and skips comments / URLs.
      - name: Guard project literals (PROJECT_DIR / NAME / DISPLAY single source)
        run: node scripts/guard-project-literals.mjs

      # ISSUE-023 architectural guard: CLI handlers + core/runtime code must
      # route output through Logger. console.* is allowed only in hook
      # templates, shipped skill scripts, and hook orchestrators (Claude
      # Code stderr-prefix contract).
      - name: Guard console.* usage (Logger required outside hooks/templates)
        run: node scripts/guard-console-usage.mjs

      # CORE-004 schema codegen guard: src/schemas/runtime/*.schema.json
      # files must be byte-equal to the canonical output of
      # `npm run schemas:generate` applied to their Zod sources. Catches
      # hand-edits, missed regenerations, and Zod source changes that
      # didn't propagate to the JSON Schema.
      - name: Guard schema codegen (Zod source == generated JSON Schema)
        run: npm run schemas:check

      - name: Verify artifact version bumps
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }} --depth=50
          node scripts/verify-artifact-versions.mjs \
            --base origin/${{ github.base_ref }} \
            --head HEAD

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Test (with coverage)
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          # Use slug to avoid the "missing token" warning on public repos.
          slug: lehidalgo/codi
          # Don't fail the job if Codecov is having a bad day.
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run shellcheck on skill templates
        run: find src/templates -name "*.sh" -exec shellcheck {} +

  version-check:
    if: github.event_name == 'pull_request' && github.base_ref == 'main' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check version was bumped
        run: |
          # Skip version bump for non-package changes (site, CI, docs)
          CHANGED=$(git diff --name-only origin/main...HEAD)
          NON_PKG=$(echo "$CHANGED" | grep -v '^site/' | grep -v '^docs/' | grep -v '^\.github/' || true)
          if [ -z "$NON_PKG" ]; then
            echo "No package changes — skipping version bump check."
            exit 0
          fi
          VERSION=$(jq -r .version package.json)
          PUBLISHED=$(npm view codi-cli version 2>/dev/null || echo "0.0.0")
          if [ "$VERSION" = "$PUBLISHED" ]; then
            echo "::error::Version v${VERSION} is already published to npm. Bump version before merging to main."
            exit 1
          fi
          echo "Version v${VERSION} is newer than published v${PUBLISHED} — ready to release."
