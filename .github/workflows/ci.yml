name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  version-check:
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version was bumped
        run: |
          VERSION=$(node -p 'require("./package.json").version')
          if git ls-remote --tags origin | grep -q "refs/tags/v${VERSION}$"; then
            echo "::error::Version v${VERSION} already released. Bump version in package.json before merging to main."
            exit 1
          fi
          echo "Version v${VERSION} is new — ready to release."
