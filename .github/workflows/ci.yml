name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  version-check:
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version was bumped
        run: |
          VERSION=$(node -p 'require("./package.json").version')
          PUBLISHED=$(npm view codi-cli version 2>/dev/null || echo "0.0.0")
          if [ "$VERSION" = "$PUBLISHED" ]; then
            echo "::error::Version v${VERSION} is already published to npm. Bump version before merging to main."
            exit 1
          fi
          echo "Version v${VERSION} is newer than published v${PUBLISHED} — ready to release."
