name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'docs/src/**'
      - 'src/**'
      - 'astro.config.mjs'
      - 'scripts/generate_site_stats.mjs'
      - 'package.json'
      - 'tsconfig.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build CLI
        run: pnpm build
      - name: Generate site stats from source
        run: node scripts/generate_site_stats.mjs
      - name: Build Astro docs into site/docs/
        run: pnpm docs:build
      - name: Regenerate installer checksum
        run: |
          cd site
          shasum -a 256 install.sh > install.sh.sha256
          shasum -a 256 -c install.sh.sha256
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v5
