schema_version: 1
hooks:
  - bucket: git
    name: php-cs-fixer
    description: PHP code style fixer
    version: "1"
    managed_by: ${PROJECT_CLI}
    required: false
    default: true
    category: format
    language: php
    files: "**/*.php"
    stages:
      - pre-commit
    shell:
      command: php-cs-fixer fix
      passFiles: true
      modifiesFiles: true
      toolBinary: php-cs-fixer
    preCommit:
      kind: local
      entry: php-cs-fixer fix
      language: system
    installHint:
      command: composer global require friendsofphp/php-cs-fixer
  - bucket: git
    name: phpstan
    description: PHP static analyser
    version: "1"
    managed_by: ${PROJECT_CLI}
    required: true
    default: true
    category: type-check
    language: php
    files: "**/*.php"
    stages:
      - pre-push
    shell:
      command: phpstan analyse
      passFiles: false
      modifiesFiles: false
      toolBinary: phpstan
    preCommit:
      kind: local
      entry: phpstan analyse
      language: system
      passFilenames: false
    installHint:
      command: composer global require phpstan/phpstan
  - bucket: git
    name: phpcs-security
    description: PHP security audit ruleset
    version: "1"
    managed_by: ${PROJECT_CLI}
    required: true
    default: true
    category: security
    language: php
    files: "**/*.php"
    stages:
      - pre-commit
    shell:
      command: phpcs --standard=Security
      passFiles: true
      modifiesFiles: false
      toolBinary: phpcs
    preCommit:
      kind: local
      entry: phpcs --standard=Security
      language: system
    installHint:
      command: composer global require pheromone/phpcs-security-audit
