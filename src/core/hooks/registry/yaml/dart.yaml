schema_version: 1
hooks:
  - bucket: git
    name: dart-format
    description: Dart formatter
    version: "1"
    managed_by: ${PROJECT_CLI}
    required: false
    default: true
    category: format
    language: dart
    files: "**/*.dart"
    stages:
      - pre-commit
    shell:
      command: dart format
      passFiles: true
      modifiesFiles: true
      toolBinary: dart
    preCommit:
      kind: local
      entry: dart format
      language: system
    installHint:
      command: Install Dart SDK from https://dart.dev
  - bucket: git
    name: dart-analyze
    description: Dart static analyser
    version: "1"
    managed_by: ${PROJECT_CLI}
    required: true
    default: true
    category: lint
    language: dart
    files: "**/*.dart"
    stages:
      - pre-commit
    shell:
      command: dart analyze
      passFiles: true
      modifiesFiles: false
      toolBinary: dart
    preCommit:
      kind: local
      entry: dart analyze
      language: system
    installHint:
      command: Install Dart SDK from https://dart.dev
