id: feature
name: Feature
description: Build new functionality, intent → plan → decompose → execute → verify → done
version: 1
phases:
  intent: { gates: [task_described], next: [plan, abandoned] }
  plan: { gates: [scope_files_listed, plan_artifact_exists], next: [decompose, abandoned] }
  decompose: { gates: [], next: [execute, plan, abandoned] }
  execute: { gates: [], next: [verify, execute, abandoned] }
  verify:
    {
      gates: [validation_passes, no_unresolved_scope_proposals, all_planned_files_modified],
      next: [done, execute, abandoned],
    }
  done: { gates: [], next: [] }
  abandoned: { gates: [], next: [] }
flags:
  tdd_strict: true
