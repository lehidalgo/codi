id: bug-fix
name: Bug fix
description: Reproduce, plan hypotheses, fix, verify
version: 1
phases:
  intent: { gates: [task_described], next: [reproduce, abandoned] }
  reproduce: { gates: [], next: [plan, abandoned] }
  plan: { gates: [scope_files_listed, plan_artifact_exists], next: [execute, reproduce, abandoned] }
  execute: { gates: [], next: [verify, execute, abandoned] }
  verify:
    {
      gates: [validation_passes, no_unresolved_scope_proposals, all_planned_files_modified],
      next: [done, execute, abandoned],
    }
  done: { gates: [], next: [] }
  abandoned: { gates: [], next: [] }
flags:
  tdd_strict: true
  reproducer_first: true
