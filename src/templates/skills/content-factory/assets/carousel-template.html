<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Carousel — Content Factory</title>
<style>
  :root {
    --brand-bg: #0f172a;
    --brand-text: #e2e8f0;
    --brand-accent: #60a5fa;
    --brand-accent-alt: #34d399;
    --brand-muted: #94a3b8;
    --brand-surface: #1e293b;
    --brand-border: #334155;
    --brand-font: 'JetBrains Mono', 'SF Mono', monospace;
    --brand-font-body: system-ui, -apple-system, sans-serif;
    --slide-width: 1080px;
    --slide-height: 1080px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a12;
    font-family: var(--brand-font-body);
    data-export-width: 1080;
    data-export-height: 1080;
  }

  section[data-index] {
    width: var(--slide-width);
    height: var(--slide-height);
    background: var(--brand-bg);
    color: var(--brand-text);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 80px 64px;
    position: relative;
    overflow: hidden;
  }

  .slide-header {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 24px 32px;
    font-family: var(--brand-font);
    font-size: 16px;
    color: var(--brand-accent);
  }
  .slide-counter {
    color: var(--brand-muted);
    font-size: 14px;
  }
  .slide-accent-bar {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 60px; height: 4px;
    border-radius: 2px;
    background: var(--brand-accent-alt);
  }

  h1 { font-size: 48px; line-height: 1.2; text-align: center; font-family: var(--brand-font); color: var(--brand-accent); margin-bottom: 24px; }
  h2 { font-size: 36px; line-height: 1.3; font-family: var(--brand-font); margin-bottom: 16px; }
  p { font-size: 20px; line-height: 1.6; color: var(--brand-muted); text-align: center; max-width: 800px; }
  .stat { font-size: 120px; font-weight: 700; color: var(--brand-accent); font-family: var(--brand-font); line-height: 1; }
  .label { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; color: var(--brand-muted); margin-bottom: 12px; }
</style>
</head>
<body data-export-width="1080" data-export-height="1080">

<!-- Slide 1: Hook -->
<section data-index="1" data-type="hook">
  <div class="slide-header">
    <span>brand_</span>
    <span class="slide-counter">1 / 8</span>
  </div>
  <h1>Headline Goes Here</h1>
  <p>Subtitle or hook text</p>
  <div class="slide-accent-bar"></div>
</section>

<!-- Slide 2: Content -->
<section data-index="2" data-type="content">
  <div class="slide-header">
    <span>brand_</span>
    <span class="slide-counter">2 / 8</span>
  </div>
  <span class="label">Section Label</span>
  <h2>Key Point</h2>
  <p>Supporting explanation text goes here. Keep it concise.</p>
  <div class="slide-accent-bar"></div>
</section>

<!-- Slide 3: Stat -->
<section data-index="3" data-type="stat">
  <div class="slide-header">
    <span>brand_</span>
    <span class="slide-counter">3 / 8</span>
  </div>
  <p class="stat">42%</p>
  <p>Description of the statistic</p>
  <div class="slide-accent-bar"></div>
</section>

<!-- Slide 4: CTA -->
<section data-index="4" data-type="cta">
  <div class="slide-header">
    <span>brand_</span>
    <span class="slide-counter">4 / 8</span>
  </div>
  <span class="label">Call to Action</span>
  <h2>Next Step Title</h2>
  <p>Tell the audience what to do next</p>
  <div class="slide-accent-bar"></div>
</section>

<!-- Agent: Duplicate and modify sections above to create slides 5-8.
     Each section MUST have data-index and data-type attributes.
     Inline preview-shell.js and html2canvas before </body>. -->

</body>
</html>
