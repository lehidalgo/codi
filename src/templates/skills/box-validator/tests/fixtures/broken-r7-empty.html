<!doctype html>
<html>
<head><meta charset="utf-8"><style>
  html, body { margin: 0; padding: 0; }
  body { width: 800px; height: 800px; }
  .canvas {
    width: 800px; height: 800px; box-sizing: border-box;
    display: flex; flex-direction: column;
    padding: 20px; gap: 20px;
    background: #fff;
  }
  .canvas > .filled { flex: 1; min-height: 0; background: #eee; }
  .canvas > .empty { flex: 1; min-height: 0; }
</style></head>
<body>
  <div class="canvas">
    <div class="filled">filled</div>
    <div class="empty"></div>
  </div>
</body>
</html>
