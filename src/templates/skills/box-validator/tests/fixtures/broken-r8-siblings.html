<!doctype html>
<html>
<head><meta charset="utf-8"><style>
  html, body { margin: 0; padding: 0; }
  body { width: 1000px; height: 400px; }
  .row {
    width: 1000px; height: 400px; box-sizing: border-box;
    display: flex; flex-direction: row;
    padding: 20px; gap: 20px;
    background: #fff;
  }
  .row > * { flex: 1; min-width: 0; }
  .card {
    display: flex; flex-direction: row;
    padding: 16px; gap: 16px;
    box-sizing: border-box;
    background: #fafafa; border: 1px solid #ddd;
  }
  .num { flex: 0 0 auto; display: flex; align-items: center; }
  .body { flex: 1; min-width: 0; display: flex; align-items: center; }
  .c1 .num { width: 80px; }
  .c2 .num { width: 120px; }
  .c3 .num { width: 100px; }
</style></head>
<body>
  <div class="row">
    <div class="card c1" data-box-group="card"><div class="num">01</div><div class="body">aaa</div></div>
    <div class="card c2" data-box-group="card"><div class="num">02</div><div class="body">bbb</div></div>
    <div class="card c3" data-box-group="card"><div class="num">03</div><div class="body">ccc</div></div>
  </div>
</body>
</html>
