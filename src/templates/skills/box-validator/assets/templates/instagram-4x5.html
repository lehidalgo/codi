<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Instagram 4:5 starter</title>
<style>
  html, body { margin: 0; padding: 0; }
  body { width: 1080px; height: 1350px; font-family: system-ui, sans-serif; }
  .canvas {
    width: 1080px;
    height: 1350px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    padding: 40px;
    gap: 40px;
    background: #FAFAFA;
  }
  .canvas > * { flex: 1; min-height: 0; }
  .header, .footer {
    display: flex;
    flex-direction: row;
    padding: 20px;
    gap: 20px;
    box-sizing: border-box;
    background: #fff;
    border: 1px solid #E5E5E5;
    border-radius: 12px;
  }
  .header > *, .footer > * { flex: 1; min-width: 0; }
  .body {
    display: flex;
    flex-direction: column;
    padding: 28px;
    gap: 28px;
    box-sizing: border-box;
    background: #fff;
    border: 1px solid #E5E5E5;
    border-radius: 16px;
  }
  .body > * { flex: 1; min-height: 0; }
  .leaf {
    color: #111; font-size: 28px;
    display: flex; align-items: center; justify-content: center;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="header">
      <div class="leaf">brand</div>
      <div class="leaf">01 / 05</div>
    </div>
    <div class="body">
      <div class="leaf">Headline goes here.</div>
      <div class="leaf">Supporting detail that fills the remaining space.</div>
      <div class="leaf">A third line of content to prove recursion.</div>
    </div>
    <div class="footer">
      <div class="leaf">@handle</div>
      <div class="leaf">website.com</div>
    </div>
  </div>
</body>
</html>
