<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>A4 Portrait starter</title>
<style>
  html, body { margin: 0; padding: 0; }
  body { width: 794px; height: 1123px; font-family: Georgia, serif; }
  .page {
    width: 794px;
    height: 1123px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    padding: 48px;
    gap: 48px;
    background: #fff;
  }
  .page > * { flex: 1; min-height: 0; }
  .section {
    display: flex;
    flex-direction: column;
    padding: 24px;
    gap: 24px;
    box-sizing: border-box;
    background: #FAFAFA;
    border: 1px solid #E5E5E5;
  }
  .section > * { flex: 1; min-height: 0; }
  .leaf {
    color: #111; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="page">
    <div class="section">
      <div class="leaf">Report title.</div>
      <div class="leaf">Subtitle with context about the document.</div>
    </div>
    <div class="section">
      <div class="leaf">Main body paragraph one.</div>
      <div class="leaf">Main body paragraph two.</div>
      <div class="leaf">Main body paragraph three.</div>
    </div>
  </div>
</body>
</html>
