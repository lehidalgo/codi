<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Transcriber</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; }
    .container { max-width: 800px; margin: 0 auto; padding: 2rem 1rem; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }
    .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 1.5rem; margin-bottom: 1rem; }
    .card h2 { font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #666; margin-bottom: 1rem; }
    .row { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .field { display: flex; flex-direction: column; gap: 0.35rem; flex: 1; min-width: 180px; }
    label { font-size: 0.8rem; font-weight: 500; color: #555; }
    input, select, textarea {
      border: 1px solid #d0d0d0; border-radius: 6px; padding: 0.5rem 0.75rem;
      font-size: 0.9rem; width: 100%; transition: border-color 0.15s;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #4f46e5; }
    .drop-zone {
      border: 2px dashed #d0d0d0; border-radius: 8px; padding: 2rem;
      text-align: center; cursor: pointer; transition: border-color 0.15s, background 0.15s;
    }
    .drop-zone:hover, .drop-zone.drag-over { border-color: #4f46e5; background: #f5f3ff; }
    .drop-zone input[type=file] { display: none; }
    .drop-zone .icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .drop-zone .hint { font-size: 0.8rem; color: #888; margin-top: 0.35rem; }
    .file-info { margin-top: 0.75rem; font-size: 0.85rem; color: #4f46e5; font-weight: 500; }
    .btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      border: none; border-radius: 6px; padding: 0.55rem 1.1rem;
      font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary { background: #4f46e5; color: #fff; }
    .btn-secondary { background: #f0f0f0; color: #333; }
    .btn-success { background: #16a34a; color: #fff; }
    .btn-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.75rem; }
    textarea#transcript {
      min-height: 200px; resize: vertical; font-family: monospace; font-size: 0.85rem;
      line-height: 1.6; background: #fafafa;
    }
    .progress-log {
      background: #1a1a1a; color: #a0f0a0; font-family: monospace; font-size: 0.78rem;
      border-radius: 6px; padding: 0.75rem 1rem; max-height: 140px; overflow-y: auto;
      display: none; margin-top: 0.75rem;
    }
    .progress-log.visible { display: block; }
    .status { display: inline-flex; align-items: center; gap: 0.35rem; font-size: 0.8rem; font-weight: 500; }
    .status.ok { color: #16a34a; }
    .status.idle { color: #888; }
    .sheets-status { margin-bottom: 0.75rem; }
    .divider { border: none; border-top: 1px solid #e8e8e8; margin: 0.75rem 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid currentColor; border-top-color: transparent;
      border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle;
    }
    .meta { font-size: 0.78rem; color: #888; margin-top: 0.5rem; }
  </style>
</head>
<body>
<div class="container">
  <h1>🎙 Audio Transcriber</h1>

  <!-- Config -->
  <div class="card">
    <h2>Configuration</h2>
    <div class="row">
      <div class="field" style="flex:2">
        <label for="apiKey">OpenAI API Key</label>
        <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off">
      </div>
      <div class="field">
        <label for="model">Model</label>
        <select id="model">
          <option value="whisper-1">whisper-1</option>
        </select>
      </div>
      <div class="field">
        <label for="language">Language</label>
        <select id="language">
          <option value="">Auto-detect</option>
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="pt">Portuguese</option>
          <option value="it">Italian</option>
          <option value="ja">Japanese</option>
          <option value="zh">Chinese</option>
          <option value="ko">Korean</option>
          <option value="ru">Russian</option>
          <option value="ar">Arabic</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Upload -->
  <div class="card">
    <h2>Audio / Video File</h2>
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".mp3,.wav,.m4a,.ogg,.flac,.aac,.mp4,.webm,.mov,.avi,.mkv">
      <div class="icon">📂</div>
      <div>Drop your file here or <strong>click to browse</strong></div>
      <div class="hint">mp3 · wav · m4a · ogg · flac · mp4 · webm · mov</div>
      <div class="file-info" id="fileInfo"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="transcribeBtn" disabled>📝 Transcribe</button>
    </div>
    <div class="progress-log" id="progressLog"></div>
  </div>

  <!-- Output -->
  <div class="card">
    <h2>Transcript</h2>
    <textarea id="transcript" placeholder="Transcript will appear here after processing…" readonly></textarea>
    <div class="meta" id="metaInfo"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" id="copyBtn" disabled>📋 Copy</button>
      <button class="btn btn-secondary" id="downloadBtn" disabled>💾 Download .txt</button>
    </div>
  </div>

  <!-- Google Sheets -->
  <div class="card">
    <h2>Google Sheets <span style="font-weight:400;text-transform:none;font-size:0.8rem;color:#888">(optional)</span></h2>
    <div class="sheets-status">
      <span class="status idle" id="sheetsStatus">⬤ Not connected</span>
    </div>
    <button class="btn btn-secondary" id="connectBtn">🔗 Connect Google Account</button>
    <hr class="divider">
    <div class="row" style="align-items:flex-end">
      <div class="field" style="flex:3">
        <label for="sheetUrl">Spreadsheet URL</label>
        <input type="url" id="sheetUrl" placeholder="https://docs.google.com/spreadsheets/d/…" disabled>
      </div>
      <div>
        <button class="btn btn-secondary" id="loadSheetsBtn" disabled>Load sheets</button>
      </div>
    </div>
    <div class="row" style="margin-top:0.75rem;align-items:flex-end">
      <div class="field">
        <label for="worksheetSelect">Worksheet</label>
        <select id="worksheetSelect" disabled>
          <option value="">— select sheet —</option>
        </select>
      </div>
      <div>
        <button class="btn btn-success" id="saveToSheetBtn" disabled>💾 Save to Sheet</button>
      </div>
    </div>
    <div class="meta" id="sheetsSaveStatus"></div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

let selectedFile = null;
let lastResult = null;
let sheetsConnected = false;

// ── Helpers ─────────────────────────────────────────────────────────

function setLoading(btn, loading, idleText) {
  btn.disabled = loading;
  btn.textContent = '';
  if (loading) {
    const s = document.createElement('span');
    s.className = 'spinner';
    btn.appendChild(s);
    btn.appendChild(document.createTextNode(' ' + idleText.replace(/^[^\s]+\s/, '')));
  } else {
    btn.textContent = idleText;
  }
}

function addLog(text) {
  const log = $('progressLog');
  const p = document.createElement('p');
  p.textContent = '> ' + text;
  log.appendChild(p);
  log.scrollTop = log.scrollHeight;
}

// ── Drop zone ───────────────────────────────────────────────────────
const dropZone = $('dropZone');
const fileInput = $('fileInput');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f) setFile(f);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });

function setFile(f) {
  selectedFile = f;
  const mb = (f.size / 1024 / 1024).toFixed(2);
  $('fileInfo').textContent = f.name + ' — ' + mb + ' MB';
  $('transcribeBtn').disabled = false;
}

// ── Transcribe ──────────────────────────────────────────────────────
$('transcribeBtn').addEventListener('click', async () => {
  if (!selectedFile) return;
  const apiKey = $('apiKey').value.trim();
  if (!apiKey) { alert('Please enter your OpenAI API key.'); return; }

  const btn = $('transcribeBtn');
  setLoading(btn, true, '📝 Transcribing…');

  const log = $('progressLog');
  log.textContent = '';
  log.classList.add('visible');
  addLog('Uploading file…');

  const form = new FormData();
  form.append('file', selectedFile);
  form.append('api_key', apiKey);
  form.append('model', $('model').value);
  form.append('language', $('language').value);

  try {
    const res = await fetch('/api/transcribe', { method: 'POST', body: form });
    const data = await res.json();
    if (!res.ok || data.error) { addLog('Error: ' + data.error); return; }

    (data.progress || []).forEach(addLog);

    lastResult = data;
    $('transcript').value = data.text;
    $('metaInfo').textContent =
      'Duration: ' + data.duration_minutes.toFixed(1) + ' min · ' +
      'Chunks: ' + data.num_chunks + ' · ' +
      'Cost: $' + data.cost.toFixed(4) + ' · ' +
      'Time: ' + data.processing_seconds.toFixed(1) + 's';
    $('copyBtn').disabled = false;
    $('downloadBtn').disabled = false;
    if (sheetsConnected) $('saveToSheetBtn').disabled = false;
    addLog('Done!');
  } catch (err) {
    addLog('Network error: ' + err.message);
  } finally {
    setLoading(btn, false, '📝 Transcribe');
  }
});

// ── Copy & Download ─────────────────────────────────────────────────
$('copyBtn').addEventListener('click', () => {
  navigator.clipboard.writeText($('transcript').value).then(() => {
    $('copyBtn').textContent = '✅ Copied!';
    setTimeout(() => { $('copyBtn').textContent = '📋 Copy'; }, 1500);
  });
});

$('downloadBtn').addEventListener('click', () => {
  if (!lastResult) return;
  const blob = new Blob([lastResult.text], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const base = (selectedFile?.name || 'transcript').replace(/\.[^.]+$/, '');
  a.download = base + '_transcript.txt';
  a.click();
  URL.revokeObjectURL(a.href);
});

// ── Google Sheets ───────────────────────────────────────────────────
async function checkSheetsStatus() {
  try {
    const res = await fetch('/api/sheets/status');
    const { connected } = await res.json();
    setSheetsConnected(connected);
  } catch {}
}

function setSheetsConnected(ok) {
  sheetsConnected = ok;
  const badge = $('sheetsStatus');
  badge.textContent = ok ? '⬤ Connected' : '⬤ Not connected';
  badge.className = ok ? 'status ok' : 'status idle';
  $('sheetUrl').disabled = !ok;
  $('loadSheetsBtn').disabled = !ok;
  if (ok && lastResult) $('saveToSheetBtn').disabled = false;
}

$('connectBtn').addEventListener('click', async () => {
  const btn = $('connectBtn');
  setLoading(btn, true, '🔗 Connecting…');
  try {
    const res = await fetch('/api/sheets/connect', { method: 'POST' });
    const data = await res.json();
    if (data.connected) setSheetsConnected(true);
    else alert('Connection failed: ' + data.error);
  } catch (err) {
    alert('Error: ' + err.message);
  } finally {
    setLoading(btn, false, '🔗 Connect Google Account');
  }
});

$('loadSheetsBtn').addEventListener('click', async () => {
  const url = $('sheetUrl').value.trim();
  if (!url) return;
  const btn = $('loadSheetsBtn');
  setLoading(btn, true, 'Loading…');
  try {
    const res = await fetch('/api/sheets/worksheets', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url }),
    });
    const data = await res.json();
    if (data.error) { alert(data.error); return; }
    const sel = $('worksheetSelect');
    while (sel.options.length > 1) sel.remove(1);
    data.worksheets.forEach(name => {
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      sel.appendChild(opt);
    });
    sel.disabled = false;
  } catch (err) {
    alert('Error: ' + err.message);
  } finally {
    setLoading(btn, false, 'Load sheets');
  }
});

$('saveToSheetBtn').addEventListener('click', async () => {
  if (!lastResult) { alert('No transcript to save.'); return; }
  const url = $('sheetUrl').value.trim();
  const worksheet = $('worksheetSelect').value;
  if (!url || !worksheet) { alert('Select a spreadsheet and worksheet first.'); return; }
  const btn = $('saveToSheetBtn');
  setLoading(btn, true, '💾 Saving…');
  try {
    const res = await fetch('/api/sheets/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        url, worksheet,
        transcript: lastResult.text,
        source_file: selectedFile?.name || '',
        duration_minutes: lastResult.duration_minutes,
        cost: lastResult.cost,
      }),
    });
    const data = await res.json();
    if (data.error) { $('sheetsSaveStatus').textContent = 'Error: ' + data.error; return; }
    $('sheetsSaveStatus').textContent = 'Saved to row ' + data.row + ' in "' + worksheet + '"';
  } catch (err) {
    $('sheetsSaveStatus').textContent = 'Error: ' + err.message;
  } finally {
    setLoading(btn, false, '💾 Save to Sheet');
  }
});

checkSheetsStatus();
</script>
</body>
</html>
