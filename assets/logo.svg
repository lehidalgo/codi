<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <!-- Terminal window -->
  <rect x="0" y="0" width="400" height="120" rx="12" fill="#1e1e2e"/>
  <rect x="0" y="0" width="400" height="36" rx="12" fill="#2d2d44"/>
  <rect x="0" y="24" width="400" height="12" fill="#2d2d44"/>

  <!-- Window controls -->
  <circle cx="20" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="18" r="6" fill="#27c93f"/>

  <!-- Terminal title -->
  <text x="200" y="22" font-size="12" font-family="SF Mono, Monaco, Consolas, monospace" fill="#8888aa" text-anchor="middle">terminal</text>

  <!-- Prompt line -->
  <text x="24" y="78" font-size="32" font-family="SF Mono, Monaco, Consolas, monospace" font-weight="bold" fill="#27ae60">$</text>
  <text x="52" y="78" font-size="32" font-family="SF Mono, Monaco, Consolas, monospace" font-weight="bold" fill="#cdd6f4">codi</text>

  <!-- Blinking cursor -->
  <rect x="142" y="54" width="3" height="28" fill="#89b4fa" rx="1">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Subtitle -->
  <text x="24" y="104" font-size="13" font-family="SF Mono, Monaco, Consolas, monospace" fill="#6c7086">unified config for AI coding agents</text>
</svg>
